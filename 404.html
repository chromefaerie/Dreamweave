<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>404 — Dreamweave Studio</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #291d14;
  --pink: #ff33a1;
  --pink-dim: rgba(255,51,161,0.5);
  --pink-faint: rgba(255,51,161,0.07);
  --pink-border: rgba(255,51,161,0.25);
  --font: 'VT323', monospace;
}
html, body { width: 100%; height: 100%; background: var(--bg); color: var(--pink); font-family: var(--font); overflow: hidden; cursor: none; }
#cursor { position: fixed; pointer-events: none; z-index: 99999999; width: 13px; height: 20px; transform: translate(-1px, -1px); }
canvas { position: fixed; inset: 0; opacity: 0.12; pointer-events: none; z-index: 0; }
.container { position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0; padding: 20px; }
.window { width: min(480px, calc(100vw - 32px)); border: 2px solid var(--pink); background: rgba(16,8,5,0.97); box-shadow: 0 0 40px rgba(255,51,161,0.2), 0 0 80px rgba(255,51,161,0.08); animation: fadeIn 0.6s ease forwards; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.titlebar { height: 24px; background: var(--pink); display: flex; align-items: stretch; position: relative; overflow: hidden; }
.titlebar::after { content: ''; position: absolute; inset: 0; background-image: repeating-conic-gradient(rgba(41,29,20,0.6) 0% 25%, transparent 0% 50%); background-size: 4px 4px; -webkit-mask-image: linear-gradient(to right, transparent 25%, black 80%); mask-image: linear-gradient(to right, transparent 25%, black 80%); pointer-events: none; }
.titlebar-text { flex: 1; text-align: center; font-size: 15px; color: #1a0a08; letter-spacing: 3px; font-weight: bold; display: flex; align-items: center; justify-content: center; position: relative; z-index: 1; }
.win-body { padding: 32px 28px 28px; display: flex; flex-direction: column; align-items: center; gap: 20px; text-align: center; }
.error-code { font-size: clamp(80px, 20vw, 120px); color: var(--pink); text-shadow: 0 0 20px var(--pink), 0 0 60px rgba(255,51,161,0.4); line-height: 1; letter-spacing: 8px; animation: flicker 4s ease-in-out infinite; }
@keyframes flicker { 0%, 95%, 100% { opacity: 1; } 96% { opacity: 0.6; } 97% { opacity: 1; } 98% { opacity: 0.4; } 99% { opacity: 1; } }
.error-msg { font-size: 18px; color: var(--pink-dim); letter-spacing: 2px; line-height: 1.6; }
.error-msg em { color: var(--pink); font-style: normal; text-shadow: 0 0 8px var(--pink); }
.divider { width: 100%; height: 1px; background: var(--pink-border); }
.btn-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
.btn { font-family: var(--font); font-size: 15px; letter-spacing: 2px; color: var(--pink); border: 1px solid var(--pink-border); padding: 8px 20px; background: transparent; cursor: none; text-decoration: none; transition: background 0.15s, border-color 0.15s; -webkit-tap-highlight-color: transparent; }
.btn:hover, .btn:active { background: var(--pink-faint); border-color: var(--pink); }
.btn.primary { border-color: var(--pink); color: var(--pink); text-shadow: 0 0 8px var(--pink); }
.sparkle { font-size: 24px; color: var(--pink); text-shadow: 0 0 10px var(--pink); animation: spinSpiral 4s linear infinite; }
@keyframes spinSpiral { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="cursor" aria-hidden="true">
  <svg viewBox="0 0 13 20" width="13" height="20" xmlns="http://www.w3.org/2000/svg">
    <polygon points="0,0 0,16 4,12 7,19 9,18 6,11 11,11" fill="#ff33a1"/>
  </svg>
</div>
<canvas id="rain" aria-hidden="true"></canvas>
<div class="container">
  <div class="window" role="main">
    <div class="titlebar"><div class="titlebar-text">ERROR.EXE</div></div>
    <div class="win-body">
      <div class="error-code">404</div>
      <div class="error-msg">
        THIS PAGE <em>DOES NOT EXIST.</em><br>
        IT NEVER DID.<br>
        OR MAYBE IT DID AND NOW IT'S GONE.
      </div>
      <div class="divider"></div>
      <div class="sparkle">꩜</div>
      <div class="btn-row">
        <a href="/" class="btn primary">↩ GO HOME</a>
      </div>
    </div>
  </div>
</div>
<script>
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => { cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px'; });
(function() {
  const canvas = document.getElementById('rain');
  const ctx = canvas.getContext('2d');
  const fs = 11;
  let cols, drops;
  function init() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; cols = Math.floor(canvas.width / fs); drops = Array.from({length: cols}, () => Math.random() * -60); }
  function draw() { ctx.fillStyle = 'rgba(41,29,20,0.1)'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = '#ff33a1'; ctx.font = fs + 'px VT323, monospace'; for (let i = 0; i < drops.length; i++) { ctx.fillText(Math.random() > 0.5 ? '1' : '0', i * fs, drops[i] * fs); if (drops[i] * fs > canvas.height && Math.random() > 0.97) drops[i] = 0; drops[i] += 0.35; } }
  window.addEventListener('resize', init);
  init();
  setInterval(draw, 200);
})();
</script>
</body>
</html>
